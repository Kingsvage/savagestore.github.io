<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savage Store | Free Fire Top-Up</title>
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/N617Fj0N/image-19.jpg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <!-- Hero Landing Page -->
    <div id="landing-page">
        <div class="hero-overlay">
            <div class="hero-content">
                <img src="https://i.ibb.co/bMVsz0g1/SAVAGE-LOGO.png" alt="Savage Logo" class="main-logo">
                
                <h1 class="neon-text main-title">SAVAGE STORE</h1>
                <p class="subtitle">INSTANT FREE FIRE DIAMONDS • ACCOUNTS • BUNDLES</p>
                
                <div class="features">
                    <div>⚡ 24HR Delivery</div>
                    <div>🔒 Secure Payment</div>
                    <div>🌍 Global Top-Up</div>
                </div>

                <button class="action-btn big-btn" onclick="signInWithGoogle()">
                    AUTHORIZE ACCESS &amp; START SHOPPING
                </button>

                <p class="trust-text">Trusted by thousands of Free Fire players • Safe &amp; Fast</p>
            </div>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="main-app" class="hidden">
        <!-- Your previous header + sections go here -->
        <header>
            <div class="nav-container">
                <div class="brand">
                    <img src="https://i.ibb.co/bMVsz0g1/SAVAGE-LOGO.png" alt="Savage Logo" class="header-logo">
                    <span>SAVAGE STORE</span>
                </div>
                <nav>
                    <button onclick="showSection('market')">MARKET</button>
                    <button onclick="showSection('diamonds')">DIAMONDS</button>
                    <button onclick="showSection('orders')">MY ORDERS</button>
                    <button id="admin-link" class="hidden" onclick="showSection('admin')">ADMIN</button>
                    <button onclick="userLogout()" style="color: var(--pink);">LOGOUT</button>
                </nav>
            </div>
        </header>

        <div class="ticker-wrap">
            <div class="ticker">✅ INSTANT TOP-UP • 24HR FULFILLMENT • SECURE WHATSAPP PAYMENT</div>
        </div>

        <!-- Other sections (market, diamonds, orders, admin) remain the same -->
        <main id="section-market" class="app-section"> ... </main>
        <!-- Keep the rest of your sections as they are -->
    </div>

    <!-- Keep your existing modals here (order-modal, sell-modal) -->

    <script type="module" src="script.js"></script>
</body>
</html>
